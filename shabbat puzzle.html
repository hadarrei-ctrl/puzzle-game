<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משחק פאזל שבת</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --accent: #e8c547;
    --accent2: #ff6b6b;
    --text: #f0ede6;
    --muted: #5a5a72;
    --piece-border: rgba(232, 197, 71, 0.3);
    --piece-hover: rgba(232, 197, 71, 0.15);
    --cols: 5;
    --rows: 4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(232,197,71,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  header {
    width: 100%;
    max-width: 800px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }
  .progress-bar-wrap { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: var(--muted); }
  .progress-bar { width: 120px; height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px; border-radius: 50px; border: none; cursor: pointer;
    font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 600; transition: all 0.25s ease;
  }
  .btn-primary { background: var(--accent); color: #0a0a0f; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,197,71,0.35); }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  /* Thumbnails */
  #thumbnails { display: flex; flex-wrap: wrap; gap: 10px; max-width: 600px; width: 100%; margin-top: 20px; justify-content: center; }
  .thumb-item { width: 100px; height: 100px; border-radius: 12px; overflow: hidden; border: 3px solid var(--accent); }
  .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
  /* Upload screen */
  #upload-screen { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 600px; }
  #upload-screen h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; text-align: center; }
  #upload-screen p { color: var(--muted); font-size: 0.9rem; text-align: center; margin-bottom: 20px; }
  .controls-row { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; justify-content: center; }
  /* Game */
  #game-area { display: none; width: 100%; max-width: 800px; flex-direction: column; align-items: center; gap: 24px; }
  .game-info { display: flex; align-items: center; gap: 20px; font-size: 0.9rem; color: var(--muted); }
  .pieces-left { color: var(--accent); font-weight: 700; font-size: 1.1rem; }
  #puzzle-container { position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 0 0 1px rgba(232,197,71,0.15), 0 24px 80px rgba(0,0,0,0.6); user-select: none; }
  #puzzle-image { display: block; max-width: 100%; max-height: 65vh; width: auto; height: auto; }
  #pieces-layer { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(4, 1fr); }
  .puzzle-piece {
    position: relative; cursor: pointer; transition: background 0.15s ease;
    border: 1px solid var(--piece-border); background: var(--surface); overflow: hidden;
  }
  .puzzle-piece::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%); pointer-events: none; }
  .puzzle-piece:hover { background: var(--piece-hover); z-index: 2; border-color: var(--accent); }
  .puzzle-piece.removed { background: transparent !important; border-color: transparent !important; pointer-events: none; animation: pieceReveal 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes pieceReveal { 0% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(1.05); } 100% { opacity:0; transform:scale(0); } }
  /* Win screen */
  #win-screen { display: none; position: fixed; inset: 0; background: rgba(10,10,15,0.92); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 24px; text-align: center; backdrop-filter: blur(8px); }
  #win-screen.show { display: flex; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
  .win-emoji { font-size: 5rem; animation: bounce 0.6s ease 0.2s both; }
  @keyframes bounce { 0% { transform:scale(0) rotate(-10deg); } 70% { transform:scale(1.2) rotate(5deg); } 100% { transform:scale(1) rotate(0); } }
  .win-title { font-size: 2.5rem; font-weight: 800; }
  .win-title span { color: var(--accent); }
  .win-subtitle { color: var(--muted); font-size: 1rem; }
  .confetti-piece { position: fixed; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall linear forwards; pointer-events: none; z-index: 101; }
  @keyframes confettiFall { 0% { transform:translateY(-20px) rotate(0deg); opacity:1; } 100% { transform:translateY(110vh) rotate(720deg); opacity:0; } }
</style>
</head>
<body>

<header>
  <div class="logo">פאזל<span>.</span></div>
  <div class="progress-bar-wrap">
    <span id="image-counter"></span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
</header>

<div id="upload-screen">
  <h2>🕍 משחק פאזל שבת</h2>
  <div class="controls-row">
    <button class="btn btn-primary" onclick="startGame()">▶ התחל משחק</button>
  </div>
</div>

<div id="game-area">
  <div class="game-info">
    <span>תמונה <strong id="current-img-num">1</strong> מתוך <strong id="total-img-num">4</strong></span>
    <span>נותרו: <span class="pieces-left" id="pieces-left">20</span> חלקים</span>
  </div>
  <div id="puzzle-container">
    <img id="puzzle-image" src="" alt="תמונת פאזל">
    <div id="pieces-layer"></div>
  </div>
  <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:4px">
    <button class="btn btn-primary" id="next-btn" onclick="skipToNext()">⏭ תמונה הבאה</button>
    <button class="btn btn-ghost" onclick="goBack()">↩ חזור לתפריט</button>
  </div>
</div>

<div id="win-screen">
  <div class="win-emoji">🎉</div>
  <div class="win-title">כל הכבוד<span>!</span></div>
  <div class="win-subtitle" id="win-subtitle">סיימת את כל התמונות!</div>
  <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center">
    <button class="btn btn-primary" onclick="restartGame()">🔁 שחק שוב</button>
    <button class="btn btn-ghost" onclick="goBack()">↩ תפריט</button>
  </div>
</div>

  ];

  let currentImageIndex = 0;
  let piecesRemaining = 0;
  const TOTAL_PIECES = 20;

  // Init
  document.getElementById('total-img-num').textContent = IMAGES.length;

  function startGame() {
    currentImageIndex = 0;
    document.getElementById('upload-screen').style.display = 'none';
    document.getElementById('game-area').style.display = 'flex';
    loadPuzzle(0);
  }

  function loadPuzzle(index) {
    const img = document.getElementById('puzzle-image');
    const piecesLayer = document.getElementById('pieces-layer');
    document.getElementById('current-img-num').textContent = index + 1;
    piecesRemaining = TOTAL_PIECES;
    document.getElementById('pieces-left').textContent = piecesRemaining;
    updateNextButton();
    img.src = IMAGES[index].src;
    img.onload = () => {
      piecesLayer.innerHTML = '';
      for (let i = 0; i < TOTAL_PIECES; i++) {
        const piece = document.createElement('div');
        piece.className = 'puzzle-piece';
        piece.addEventListener('click', () => removePiece(piece));
        piecesLayer.appendChild(piece);
      }
    };
  }

  function removePiece(piece) {
    if (piece.classList.contains('removed')) return;
    piece.classList.add('removed');
    piecesRemaining--;
    document.getElementById('pieces-left').textContent = piecesRemaining;
    if (piecesRemaining === 0) {
      setTimeout(() => {
        currentImageIndex < IMAGES.length - 1 ? showWinBetween() : showWinFinal();
      }, 500);
    }
  }

  function skipToNext() {
    currentImageIndex < IMAGES.length - 1 ? showWinBetween() : showWinFinal();
  }

  function updateNextButton() {
    const btn = document.getElementById('next-btn');
    if (btn) btn.textContent = currentImageIndex < IMAGES.length - 1 ? '⏭ תמונה הבאה' : '🏁 סיים משחק';
  }

  function showWinBetween() {
    spawnConfetti();
    const ws = document.getElementById('win-screen');
    document.getElementById('win-subtitle').textContent = 'מעולה! עוברים לתמונה הבאה...';
    ws.querySelector('.win-emoji').textContent = '🥳';
    ws.classList.add('show');
    setTimeout(() => {
      ws.classList.remove('show');
      currentImageIndex++;
      loadPuzzle(currentImageIndex);
    }, 2000);
  }

  function showWinFinal() {
    spawnConfetti();
    const ws = document.getElementById('win-screen');
    document.getElementById('win-subtitle').textContent = 'סיימת את כל ' + IMAGES.length + ' התמונות! אלוף אמיתי!';
    ws.querySelector('.win-emoji').textContent = '🏆';
    ws.classList.add('show');
  }

  function restartGame() {
    document.getElementById('win-screen').classList.remove('show');
    startGame();
  }

  function goBack() {
    document.getElementById('win-screen').classList.remove('show');
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('upload-screen').style.display = 'flex';
  }

  function spawnConfetti() {
    const colors = ['#e8c547','#ff6b6b','#6bcfff','#a8ff6b','#ff6bde','#ffffff'];
    for (let i = 0; i < 60; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      c.style.animationDelay = (Math.random() * 0.8) + 's';
      c.style.width = (6 + Math.random() * 8) + 'px';
      c.style.height = (6 + Math.random() * 8) + 'px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }
</script>
